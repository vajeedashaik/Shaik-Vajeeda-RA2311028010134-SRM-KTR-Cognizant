server.port=8087
spring.application.name=payment-service

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Circuit Breaker config for third-party payment API (SB3 Ex4)
resilience4j.circuitbreaker.instances.thirdPartyPayment.register-health-indicator=true
# Open circuit after 50% failures in sliding window of 10 calls
resilience4j.circuitbreaker.instances.thirdPartyPayment.sliding-window-size=10
resilience4j.circuitbreaker.instances.thirdPartyPayment.failure-rate-threshold=50
# Stay open for 5 seconds before trying again
resilience4j.circuitbreaker.instances.thirdPartyPayment.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.thirdPartyPayment.permitted-number-of-calls-in-half-open-state=3

# Expose actuator endpoints to view circuit breaker health
management.endpoints.web.exposure.include=health,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
