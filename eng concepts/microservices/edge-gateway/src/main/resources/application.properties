server.port=9091
spring.application.name=edge-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Exercise 1: Route with custom filter for logging
spring.cloud.gateway.routes[0].id=example_route
spring.cloud.gateway.routes[0].uri=http://example.org
spring.cloud.gateway.routes[0].predicates[0]=Path=/example/**

# Exercise 2: Load-balanced route using lb:// (Eureka service name)
spring.cloud.gateway.routes[1].id=load_balanced_route
spring.cloud.gateway.routes[1].uri=lb://greet-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/loadbalanced/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Exercise 3: Route with Resilience4j circuit breaker filter
spring.cloud.gateway.routes[2].id=resilient_route
spring.cloud.gateway.routes[2].uri=lb://payment-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/payment/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[2].filters[1]=name=CircuitBreaker,args.name=paymentCircuitBreaker,args.fallbackUri=forward:/fallback

# Resilience4j circuit breaker config
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.wait-duration-in-open-state=5s

management.endpoints.web.exposure.include=health,gateway,circuitbreakers
